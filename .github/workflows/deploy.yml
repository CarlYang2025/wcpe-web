name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 也支持手动触发，防止万一
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # odds-api.io 免费套餐 API key（非敏感信息，用于自动刷新 Bet365 赔率）
        env:
          ODDS_API_KEY: 1ce5eafc5eba5b6880dc5ae3b869f1a7ccfee821dd51f92bc22c5fc0644ab315
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Smoke Test (wait for propagation)
        run: |
          echo "Waiting 15s for GitHub Pages propagation..."
          sleep 15
          
          URL="https://carlyang2025.github.io/wcpe-web/"
          echo "Testing: $URL"
          
          HTTP_CODE=$(curl -s -o /tmp/smoke.html -w "%{http_code}" "$URL" || echo "000")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ SMOKE TEST FAILED: HTTP $HTTP_CODE"
            cat /tmp/smoke.html | head -20
            exit 1
          fi
          
          # Check for React error indicators
          if grep -q 'Minified React error' /tmp/smoke.html; then
            echo "❌ SMOKE TEST FAILED: React error detected in page"
            grep -o 'Minified React error[^<]*' /tmp/smoke.html | head -5
            exit 1
          fi
          
          # Check for key elements
          if grep -q '<div id="root"' /tmp/smoke.html; then
            echo "✅ Smoke test passed: root element found, no React errors"
          else
            echo "⚠️  Warning: root element not found (may be SPA)"
          fi
          
          # Log page size for monitoring
          PAGE_SIZE=$(wc -c < /tmp/smoke.html)
          echo "Page size: ${PAGE_SIZE} bytes"
